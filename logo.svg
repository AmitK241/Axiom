<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Purple Neon Glow Effect -->
    <filter id="purple-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Cyan Neon Glow Effect -->
    <filter id="cyan-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Linear Gradients for smooth color transitions -->
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b09aff" />
      <stop offset="100%" stop-color="#8a67ff" />
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
  </defs>

  <!-- Deep Black / Tech Background (Optional - remove if transparency is needed) -->
  <rect width="100%" height="100%" fill="#0a0a12" rx="20" />

  <g transform="translate(100, 100) scale(1.1)">
    <!-- LEFT HALF: Purple Profile Outline -->
    <path d="M -5,-65 
             C -35,-65 -65,-40 -65,-5 
             C -65,20 -55,35 -45,45 
             C -45,55 -35,60 -35,65 
             L -5,65 
             Z" 
          fill="none" 
          stroke="url(#purple-grad)" 
          stroke-width="7" 
          stroke-linejoin="round"
          stroke-linecap="round"
          filter="url(#purple-glow)" />

    <!-- RIGHT HALF: Cyan Profile Outline -->
    <path d="M 5,-65 
             C 35,-65 65,-40 65,-5 
             C 65,20 55,35 45,45 
             C 45,55 35,60 35,65 
             L 5,65 
             Z" 
          fill="none" 
          stroke="url(#cyan-grad)" 
          stroke-width="7" 
          stroke-linejoin="round"
          stroke-linecap="round"
          filter="url(#cyan-glow)" />

    <!-- CENTER INDENTATION / VERTICAL SEPARATOR -->
    <line x1="0" y1="-60" x2="0" y2="60" stroke="#1f1f2e" stroke-width="3" stroke-dasharray="4 4" />
  </g>
</svg>
